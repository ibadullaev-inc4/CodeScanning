name: Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  codeql:
    name: CodeQL Scan (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy Scan (FS + Go modules)
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trivy FS scan
        uses: aquasec/trivy-action@master
        with:
          scan-type: fs
          format: table
          exit-code: 1

      - name: Trivy Go module scan
        uses: aquasec/trivy-action@master
        with:
          scan-type: go
          format: table
          exit-code: 1
